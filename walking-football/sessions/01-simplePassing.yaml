sessionNumber: 1
sessionTitle: Simple Passing
theme: Passing Fundamentals
keyPhrase: Receive. Protect. Pass.
duration: 60 minutes
players: 8-16

equipment:
  - Balls
  - Bibs
  - Cones
  - Mini Goals

objectives:
  - Make a simple accurate pass
  - Receive the ball with control
  - Create a passing angle after releasing the ball

warmup: Ball familiarisation and gentle dribbling
drill1: Passing in pairs
drill2: Receiving into space
drill3: Walking football rondo
matchPractice: Conditioned walking football match
coolDown: Gentle walking, light stretches and player reflection
coachingPoints: Use the inside of the foot and move after passing
commonMistakes: Passing too hard and standing still after passing
analysis: Observe pass weight, first touch and movement off the ball
sessionSummary: Accurate passing, controlled receiving and simple support movement
nextSession: First Touch and Movement
